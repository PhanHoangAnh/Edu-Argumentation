<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu-Augmentation | Interactive Mastery</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="assets/css/global.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen flex flex-col bg-slate-50">

    <header class="h-16 flex items-center justify-between px-8 bg-white border-b border-slate-200 z-50">
        <div class="flex items-center space-x-3">
            <div class="p-2 bg-blue-600 rounded-lg text-white">
                <i data-lucide="book-open" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl text-slate-800">Edu-Augmentation</span>
        </div>
        <div id="course-title" class="text-sm font-medium text-slate-500 truncate max-w-md"></div>
    </header>

    <main id="app-viewport" class="flex-grow relative overflow-hidden">
        <sidebar-layout></sidebar-layout>
    </main>

    <footer class="h-8 bg-white border-t border-slate-200 flex items-center px-4 justify-between text-[10px] text-slate-400 uppercase tracking-widest">
        <span>Session ID: <span id="session-guid">...</span></span>
        <span class="flex items-center">
            <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
            Gemini 3.1 Pro Online
        </span>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
